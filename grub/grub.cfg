# Load VBE driver so GRUB can set up a VESA framebuffer
insmod all_video
insmod vbe

set default=0
set timeout=3

menuentry "Azix OS v0.2" {
    # Tell GRUB to switch to 800x600x32 VBE mode when loading the kernel.
    # Because the multiboot header has FLAGS bit 2 set (video request),
    # GRUB will populate mbi->framebuffer_* before handing off.
    # No gfxterm / font file needed for this to work.
    set gfxpayload=800x600x32

    multiboot /boot/azix.kernel
    boot
}
